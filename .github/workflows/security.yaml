name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * 1" # Mo 03:00

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks (docker)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            zricethezav/gitleaks:latest detect --redact --verbose

  trivy:
    name: Trivy (config & fs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy scan (report only for now)
        uses: aquasecurity/trivy-action@0.34.2
        with:
          scan-type: fs
          scanners: vuln,secret,config
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"