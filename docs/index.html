window.__mermaid = mermaid;

		<style>:root
		{
			--bg: #0b1220;
			--panel: #0f1a2b;
			--panel2: #0c1626;
			--text: #e6edf3;

		body {

			align-items: center;

			padding: 12px 16px;

		.brand {

			gap: 10px;

		.layout {

			grid-template-columns: 300px 1fr;
			gap: 16px;

			position: sticky;

		main {

			border: 1px solid var(--border);

		.content-head {
			padding: 14px 16px;

			border-color: rgba(47, 129, 247, 0.45);
			background: rgba(47, 129, 247, 0.10);
			text-decoration: none;
		}
	</style>
</head>
<body>

	<script>
		const REPO_URL = "https://github.com/zukunftsforum-rissen/community-offers-bundle";

		<!-- DEFAULT_DOC defines the landing document shown at startup -->
const DEFAULT_DOC = "index.md";

const NAV_GROUPS = [

const $ = (id) => document.getElementById(id);
async function renderMermaidDiagrams(root) {
if (!window.__mermaid) 
return;

const mermaid = window.__mermaid;
mermaid.initialize({startOnLoad: false, theme: "dark"});
const blocks = root.querySelectorAll("pre code.language-mermaid, pre code.lang-mermaid, pre code.mermaid");
let i = 0;
for (const code of blocks) {
const pre = code.closest("pre");
const src = code.textContent;
const container = document.createElement("div");
container.className = "mermaid";
container.style.margin = "14px 0";
container.style.padding = "10px";
container.style.border = "1px solid rgba(255,255,255,.08)";
container.style.borderRadius = "12px";
container.style.background = "rgba(255,255,255,.03)";
container.textContent = src;
pre.replaceWith(container);
i++;
}
if (i > 0) 
await mermaid.run({querySelector: ".mermaid"});

}
function getRouteFile() {
const url = new URL(window.location.href);
return url.searchParams.get("doc") || DEFAULT_DOC;
}
function setRouteFile(file) {
const url = new URL(window.location.href);
url.searchParams.set("doc", file);
history.pushState({}, "", url);
loadDoc(file);
setActiveNav(file);
}
function isMarkdown(path) {
return path.toLowerCase().endsWith(".md");
}
function makeNav() {
const nav = $("nav");
nav.innerHTML = "";
for (const group of NAV_GROUPS) {
const gt = document.createElement("div");
gt.className = "group-title";
gt.textContent = group.title;
nav.appendChild(gt);
for (const item of group.items) {
const a = document.createElement("a");
if (item.file) {
a.href = `?doc=${
encodeURIComponent(item.file)
}`;
a.dataset.file = item.file;
a.addEventListener("click", (e) => {
e.preventDefault();
setRouteFile(item.file);
});
a.innerHTML = `<span>${
item.label
}</span><span style="margin-left:auto"><small>${
item.file
}</small></span>`;
} else if (item.href) {
a.href = item.href;
a.target = "_blank";
a.rel = "noreferrer";
a.innerHTML = `<span>${
item.label
}</span><span style="margin-left:auto"><small>open</small></span>`;
}
nav.appendChild(a);
}
}
}
function setActiveNav(file) {
document.querySelectorAll(".nav a[data-file]").forEach(a => a.classList.toggle("active", a.dataset.file === file));
}
async function fetchTextWithFallbacks(file) {
const BASE = new URL(".", window.location.href);
const candidates = [
new URL(file, BASE),
new URL("docs/" + file, BASE),
new URL("../docs/" + file, BASE)
];
const tried = [];
for (const url of candidates) {
tried.push(url.toString());
const res = await fetch(url, {cache: "no-store"});
if (res.ok) 
return {text: await res.text(), url: url.toString(), tried};

tried.push(`${url}  -> HTTP ${
res.status
}`);
}
const err = new Error("Document fetch failed");
err.tried = tried;
throw err;
}
async function loadDoc(file) {
$("status").textContent = "Loading…";
$("currentFilePill").textContent = file;
$("openOnGitHubBtn").onclick = () => window.open(`${REPO_URL}/blob/main/docs/${file}`, "_blank", "noreferrer");
try {
const {text} = await fetchTextWithFallbacks(file);
if (isMarkdown(file)) {
marked.setOptions({gfm: true, breaks: false});
$("content").innerHTML = marked.parse(text);
rewriteMarkdownLinks($("content"));
await renderMermaidDiagrams($("content"));
const h1 = $("content").querySelector("h1");
$("title").textContent = h1 ? h1.textContent.trim() : file;
$("content").querySelectorAll("pre code").forEach(block => {
try {
hljs.highlightElement(block);
} catch (_) {}
});
} else {
$("content").innerHTML = `<pre>${
escapeHtml(text)
}</pre>`;
$("title").textContent = file;
} $("status").textContent = "OK";
$("subtitle").textContent = `docs/${file}`;
} catch (err) {
$("status").textContent = "Error";
$("title").textContent = "Document not found";
const tried = err && err.tried ? err.tried : [];
$("content").innerHTML = `<p><b>Could not load <code>${
escapeHtml(file)
}</code>.</b></p><p style="color: var(--muted)">Details: ${
escapeHtml(err && err.message ? err.message : String(err))
}</p>${
tried.length ? `<p><b>Tried URLs:</b></p><pre>${
escapeHtml(tried.join("\n"))
}</pre>` : ""
}<p>Check whether the file is included in the Pages artifact (docs/ vs repo root).</p>`;
}
}
function rewriteMarkdownLinks(root) {
root.querySelectorAll("a[href]").forEach(a => {
const href = a.getAttribute("href");
if (! href) 
return;

if (href.startsWith("http://") || href.startsWith("https://") || href.startsWith("mailto:") || href.startsWith("#") || href.startsWith("?doc=")) 
return;

const parts = href.split("#");
const path = parts[0];
const hash = parts[1] ? "#" + parts[1] : "";
if (! path.toLowerCase().endsWith(".md")) 
return;

a.setAttribute("href", `?doc=${
encodeURIComponent(path)
}${hash}`);
});
}
function escapeHtml(s) {
return s.replace(/[&<>"']/g, (c) => ({
"&": "&amp;",
"<": "&lt;",
">": "&gt;",
'"': "&quot;",
"'": "&#39;"
}[c]));
}
function wireSearch() {
const input = $("search");
input.addEventListener("input", () => {
const q = input.value.trim().toLowerCase();
document.querySelectorAll(".nav a[data-file]").forEach(a => {
const hay = (a.dataset.file + " " + a.textContent).toLowerCase();
a.style.display = hay.includes(q) ? "" : "none";
});
});
}
window.addEventListener("popstate", () => loadDoc(getRouteFile()));
makeNav();
wireSearch();
const initial = getRouteFile();
setActiveNav(initial);
loadDoc(initial);
	</script>
