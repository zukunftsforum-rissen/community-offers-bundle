name: Build & Deploy Docs (MkDocs + Diagrams)

on:
  push:
    paths:
      - "docs/**"
      - "contao/dca/**"
      - "tools/**"
      - "mkdocs.yml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- 1) Generate PlantUML from DCA ----
      - name: Generate PlantUML from DCA
        run: |
          php -v
          php tools/generate_data_model_puml.php \
            --dca-dir contao/dca \
            --out docs/diagrams/data-model.generated.puml

      - name: Render PlantUML (PNG/PDF)
        run: |
          docker run --rm -v "$PWD":/work -w /work plantuml/plantuml \
            -tpng docs/diagrams/data-model.generated.puml
          docker run --rm -v "$PWD":/work -w /work plantuml/plantuml \
            -tpdf docs/diagrams/data-model.generated.puml

      # ---- 2) Render Mermaid ----
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install mermaid-cli
        run: npm i -g @mermaid-js/mermaid-cli

      - name: Render Mermaid (PNG/PDF)
        run: |
          test -f docs/diagrams/architecture.mmd
          mmdc -i docs/diagrams/architecture.mmd -o docs/diagrams/architecture.png
          mmdc -i docs/diagrams/architecture.mmd -o docs/diagrams/architecture.pdf

      # ---- 3) Build MkDocs site ----
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs Material
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material

      - name: Build site
        run: mkdocs build --clean

      # ---- 4) Upload to Pages ----
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4