name: Build & Deploy Pages

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Make build script executable
        run: chmod +x tools/build-diagrams.sh

      - name: Build diagrams (Docker-only)
        run: |
          tools/build-diagrams.sh

      - name: Verify PDFs exist
        run: |
          test -s docs/diagrams/generated/data-model.generated.pdf

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/

  deploy:
    name: Pages / Deploy
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5